name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  js:
    name: pnpm — typecheck + unit tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: pnpm — playwright (chromium + firefox + webkit)
    runs-on: ubuntu-latest
    needs: js
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Cache the Playwright browser binaries by version. Saves ~90s per run.
      # `pnpm exec playwright --version` returns "Version 1.x.y"; we strip the prefix.
      - name: Resolve Playwright version
        id: pw-version
        working-directory: packages/core
        run: |
          v=$(pnpm exec playwright --version | sed 's/^Version //')
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-${{ runner.os }}
      - name: Install Playwright browsers (+ system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: packages/core
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: packages/core
        run: pnpm exec playwright install-deps chromium firefox webkit
      # The plain-html example imports `caprr` via its `exports` map,
      # which points at `dist/index.js`. Without a build, the dev server
      # serves a 404 and the recorder never mounts — every test fails.
      - run: pnpm build
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: packages/core/playwright-report/
          retention-days: 14

  rust:
    name: cargo — check + clippy + fmt
    runs-on: ubuntu-latest
    needs: js
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # Rust crate needs the vendored JS+CSS to exist.
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm vendor:dioxus
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
